<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trading Dashboard</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- HTMX -->
    <script src="https://unpkg.com/htmx.org@2.0.8"></script>
    <!-- HTMX SSE Extension -->
    <script src="https://unpkg.com/htmx-ext-sse@2.2.4/sse.js"></script>
    <!-- Plotly -->
    <script src="https://cdn.plot.ly/plotly-3.4.0.min.js"></script>
</head>
<body class="bg-gray-100 text-gray-900" hx-ext="sse" sse-connect="/dashboard/events">

    <!-- Mode Banner -->
    {% if execution_mode == "live" %}
    <div class="bg-red-600 text-white text-center py-2 font-bold text-sm tracking-wide">
        LIVE TRADING
    </div>
    {% else %}
    <div class="bg-green-600 text-white text-center py-2 font-bold text-sm tracking-wide">
        PAPER TRADING
    </div>
    {% endif %}

    <div class="flex min-h-screen">
        <!-- Sidebar -->
        <nav class="w-64 bg-gray-900 text-gray-300 flex flex-col py-6 px-4">
            <h1 class="text-xl font-bold text-white mb-8 px-2">Trading System</h1>
            <a href="/dashboard/"
               class="block px-4 py-3 rounded-lg mb-1 transition-colors
                      {% if active_page == 'overview' %}bg-gray-700 text-white{% else %}hover:bg-gray-800 hover:text-white{% endif %}">
                Overview
            </a>
            <a href="/dashboard/signals"
               class="block px-4 py-3 rounded-lg mb-1 transition-colors
                      {% if active_page == 'signals' %}bg-gray-700 text-white{% else %}hover:bg-gray-800 hover:text-white{% endif %}">
                Signals
            </a>
            <a href="/dashboard/risk"
               class="block px-4 py-3 rounded-lg mb-1 transition-colors
                      {% if active_page == 'risk' %}bg-gray-700 text-white{% else %}hover:bg-gray-800 hover:text-white{% endif %}">
                Risk
            </a>
            <a href="/dashboard/pipeline"
               class="block px-4 py-3 rounded-lg mb-1 transition-colors
                      {% if active_page == 'pipeline' %}bg-gray-700 text-white{% else %}hover:bg-gray-800 hover:text-white{% endif %}">
                Pipeline & Approval
            </a>
        </nav>

        <!-- Main Content -->
        <main class="flex-1 p-6">
            {% block content %}{% endblock %}
        </main>
    </div>

    {% block extra_scripts %}{% endblock %}
</body>
</html>
