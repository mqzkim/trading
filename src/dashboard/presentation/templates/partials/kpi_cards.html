<div class="bg-white rounded-lg shadow p-4">
    <p class="text-sm text-gray-500">Total Assets</p>
    <p class="text-2xl font-bold">${{ "{:,.2f}".format(total_value) }}</p>
</div>
<div class="bg-white rounded-lg shadow p-4">
    <p class="text-sm text-gray-500">Today P&L</p>
    <p class="text-2xl font-bold {{ 'text-green-600' if today_pnl >= 0 else 'text-red-600' }}">
        ${{ "{:,.2f}".format(today_pnl) }}
    </p>
</div>
<div class="bg-white rounded-lg shadow p-4">
    <p class="text-sm text-gray-500">Drawdown</p>
    <p class="text-2xl font-bold {{ 'text-green-600' if drawdown_pct < 0.10 else ('text-yellow-600' if drawdown_pct < 0.15 else 'text-red-600') }}">
        {{ "{:.1f}%".format(drawdown_pct * 100) }}
    </p>
</div>
<div class="bg-white rounded-lg shadow p-4" sse-swap="PipelineStatusChanged">
    <p class="text-sm text-gray-500">Pipeline</p>
    {% if last_pipeline %}
    <p class="text-2xl font-bold {{ 'text-green-600' if last_pipeline.status == 'COMPLETED' else ('text-red-600' if last_pipeline.status == 'FAILED' else 'text-yellow-600') }}">
        {{ last_pipeline.status }}
    </p>
    {% else %}
    <p class="text-2xl font-bold text-gray-400">No runs</p>
    {% endif %}
</div>
