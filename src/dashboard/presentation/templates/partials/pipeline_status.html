<div sse-swap="PipelineCompletedEvent">
    <h3 class="text-lg font-semibold mb-3">Pipeline Status</h3>
    {% if pipeline_runs %}
    {% set last = pipeline_runs[0] %}
    <p class="text-sm">
        Last run: <span class="font-medium">{{ last.started_at }}</span> -
        <span class="font-semibold
            {% if last.status in ['completed'] %}text-green-600
            {% elif last.status in ['failed', 'halted'] %}text-red-600
            {% elif last.status == 'running' %}text-yellow-600
            {% else %}text-gray-600{% endif %}">
            {{ last.status | upper }}
        </span>
    </p>
    {% else %}
    <p class="text-sm text-gray-500">No pipeline runs yet</p>
    {% endif %}
    <p class="text-sm text-gray-500 mt-1">Next: {{ next_scheduled | default('Not scheduled') }}</p>
</div>
