<h3 class="text-lg font-semibold mb-3">Drawdown</h3>
<div id="drawdown-chart-container" sse-swap="DrawdownAlertEvent">
    <!-- Plotly gauge rendered by script below -->
</div>
{% if gauge_json %}
<script>
    (function() {
        var fig = {{ gauge_json | tojson }};
        Plotly.newPlot('drawdown-chart-container', fig.data, fig.layout, {responsive: true});
    })();
</script>
{% endif %}
<p class="text-center text-sm mt-2 text-gray-500">
    Level: <span class="font-semibold">{{ drawdown_level | default('normal') | title }}</span>
</p>
