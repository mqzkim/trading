<div class="bg-white rounded-lg shadow p-4" sse-swap="RegimeChangedEvent">
    <h3 class="text-lg font-semibold mb-2">Market Regime</h3>
    {% if regime and regime != 'Unknown' %}
    <span class="inline-block px-3 py-1 rounded-full text-sm font-semibold
        {% if regime == 'Bull' %}bg-green-100 text-green-800
        {% elif regime == 'Bear' %}bg-red-100 text-red-800
        {% elif regime == 'Sideways' %}bg-yellow-100 text-yellow-800
        {% elif regime == 'Crisis' %}bg-gray-200 text-gray-700
        {% else %}bg-gray-200 text-gray-700{% endif %}">
        {{ regime }}
    </span>
    {% else %}
    <span class="inline-block px-3 py-1 rounded-full text-sm font-medium bg-gray-200 text-gray-700">
        Unknown
    </span>
    {% endif %}
</div>
