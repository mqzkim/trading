<h3 class="text-lg font-semibold mb-3">Manual Review Queue</h3>
{% if review_queue %}
<table class="w-full text-sm">
    <thead class="bg-gray-50 text-gray-600 uppercase text-xs">
        <tr>
            <th class="px-4 py-3 text-left">Symbol</th>
            <th class="px-4 py-3 text-left">Strategy</th>
            <th class="px-4 py-3 text-right">Score</th>
            <th class="px-4 py-3 text-left">Reason</th>
            <th class="px-4 py-3 text-center">Actions</th>
        </tr>
    </thead>
    <tbody>
        {% for item in review_queue %}
        <tr class="border-b border-gray-100 hover:bg-gray-50">
            <td class="px-4 py-3 font-medium">{{ item.symbol }}</td>
            <td class="px-4 py-3">{{ item.strategy }}</td>
            <td class="px-4 py-3 text-right">{{ "{:.1f}".format(item.score) }}</td>
            <td class="px-4 py-3 text-gray-500">{{ item.reason }}</td>
            <td class="px-4 py-3 text-center space-x-2">
                <form class="inline">
                    <input type="hidden" name="review_id" value="{{ item.id }}">
                    <button type="submit"
                            hx-post="/dashboard/review/approve"
                            hx-target="#review-queue"
                            hx-swap="innerHTML"
                            class="px-3 py-1 bg-green-500 text-white rounded text-xs hover:bg-green-600">
                        Approve
                    </button>
                </form>
                <form class="inline">
                    <input type="hidden" name="review_id" value="{{ item.id }}">
                    <button type="submit"
                            hx-post="/dashboard/review/reject"
                            hx-target="#review-queue"
                            hx-swap="innerHTML"
                            class="px-3 py-1 bg-red-500 text-white rounded text-xs hover:bg-red-600">
                        Reject
                    </button>
                </form>
            </td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% else %}
<p class="text-gray-500 text-sm">No trades pending review</p>
{% endif %}
